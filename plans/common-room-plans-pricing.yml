    description: Enterprise plan for large organizations requiring maximum scale, dedicated support, and full platform access.
    price: 0
    unit: month
    billingCycle: annual
    notes: Custom pricing — contact sales; typically $50,000–$80,000+/year
    seats: 30
    features:
      - name: Contacts
        description: Up to 750,000 contacts
        limit: 750000
        unit: contacts
      - name: RoomieAI Research Credits
        description: AI-powered research credits
        limit: 10000
        unit: credits
      - name: Prospector Credits
        description: Credits for prospecting new contacts
        limit: 15000
