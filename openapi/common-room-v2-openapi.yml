servers:
- url: https://api.commonroom.io/community/v2
  description: Common Room API v2
tags:
- name: Token Status
  description: Operations related to API token status
- name: Contacts
  description: Operations related to contact management
- name: Organizations
  description: Operations related to organization management
- name: Activities
  description: Operations related to activity events
- name: Segments
  description: Operations related to segment management
- name: Custom Fields
  description: Operations related to custom field definitions
- name: Lead Scores
  description: Operations related to lead score definitions
- name: Tags
  description: Operations related to tags (labels)
- name: Me
  description: Information about the authenticated user
- name: Data Available
  description: Notify Common Room that data is available for import
- name: Locations
  description: Operations related to location data
- name: Topics
  description: Operations related to topics
- name: Providers
  description: Operations related to signal sources (integrations)
- name: Objects
  description: Operations related to custom objects
- name: Object Types
  description: Operations related to custom object type definitions
- name: Website Visits
  description: Operations related to website visit tracking
- name: Prospector Contacts
  description: Operations related to prospector contact discovery
- name: Prospector Companies
  description: Operations related to prospector company discovery
- name: Industries
  description: Operations related to NAICS industry codes
- name: Tech Stack Products
  description: Operations related to technographics and tech stack products
security:
- BearerAuth: []
paths:
  /api-token-status:
    get:
      summary: API Token status information
      description: 'Status information about the API token used in the request.

        '
      tags:
      - Token Status
      responses:
        '200':
          description: Core API Token Information
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiToken'
        '403':
          description: Forbidden
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
                example:
                  status: forbidden
        '429':
          $ref: '#/components/responses/RateLimited'
  /contacts/{id}:
    get:
      summary: Get a contact by ID
      description: Retrieve a specific contact by their unique identifier.
      tags:
      - Contacts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The prefixed contact ID (format `c_<number>`)
      - name: cols
        in: query
        required: false
        schema:
          type: string
        description: 'Comma-separated list of additional columns to include in the
          response.

          Valid values: `activateMessage`, `avatarUrl`, `fullName`, `location`, `primaryEmail`,

          `phoneNumbers`, `title`, `companyName`, `companyWebsite`, `connectedCustomObjects`,

          `profiles`, `jobHistory`, `leadScores`, `recentActivities`, `recentWebPages`,

          `recentWebVisitsNumber`, `segments`, `sparkSummary`, `recentSparkSummaries`,
          `tags`,

          `url`. Use `cf_*` to include all custom fields, or `cf_<id>` for a specific
          one.

          '
      responses:
        '200':
          description: OK
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: Bad Request (e.g. invalid contact ID or invalid parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiV2ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '404':
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiV2ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
  /contacts:
    get:
      summary: List contacts
      description: Retrieve a list of contacts with pagination support.
      tags:
      - Contacts
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
        description: The maximum number of contacts to return per page
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        description: Pagination cursor from a previous response
      - name: sort
        in: query
        required: false
        schema:
          type: string
          default: id
        description: 'Field to sort results by. One of: `id`, `latest_activity`, `name`,

          a lead-score ID (format `ls_<number>`), or a custom-field ID (format `cf_<number>`).

          '
      - name: direction
        in: query
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
          default: asc
        description: Sort direction
      - name: cols
        in: query
        required: false
        schema:
          type: string
        description: 'Comma-separated list of additional columns to include in the
          response.

          Valid column values: `activateMessage`, `avatarUrl`, `fullName`, `location`,

          `primaryEmail`, `phoneNumbers`, `title`, `companyName`, `companyWebsite`,

          `connectedCustomObjects`, `profiles`, `jobHistory`, `leadScores`, `recentActivities`,

          `recentWebPages`, `recentWebVisitsNumber`, `segments`, `sparkSummary`,

          `recentSparkSummaries`, `tags`, `url`. Use `cf_*` to include all custom
          fields, or

          `cf_<id>` for a specific one. The meta column `recordCount` can be requested
          to

          return the total number of matching contacts in `meta.recordCount`.

          '
      - name: organizationId
        in: query
        required: false
        schema:
          type: string
        description: Filter contacts by prefixed organization ID (format `o_<number>`)
      - name: segmentId
        in: query
        required: false
        schema:
          type: string
        description: Filter contacts by segment ID (e.g. s_123456)
      responses:
        '200':
          description: OK
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactList'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiV2ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '429':
          $ref: '#/components/responses/RateLimited'
  /organizations/{id}:
    get:
      summary: Get an organization by ID
      description: Retrieve a specific organization by its unique identifier.
      tags:
      - Organizations
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The prefixed organization ID (format `o_<number>`)
      - name: cols
        in: query
        required: false
        schema:
          type: string
        description: 'Comma-separated list of additional columns to include in the
          response.

          Valid values: `about`, `contactsCount`, `employees`, `linkedInUrl`, `profiles`,

          `revenueRangeMax`, `revenueRangeMin`, `subIndustry`, `location`, `leadScores`,

          `recentJobOpenings`, `recentNews`, `researchResults`, `surgingTopics`, `tags`,
          `topContacts`, `url`.

          Use `cf_*` to include all custom fields, or `cf_<id>` for a specific one.

          '
      responses:
        '200':
          description: OK
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          description: Bad Request (e.g. invalid organization ID or invalid parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiV2ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiV2ErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
  /organizations:
    get:
      summary: List organizations
      description: Retrieve a list of organizations with pagination support.
      tags:
      - Organizations
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
        description: The maximum number of organizations to return per page
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        description: Pagination cursor from a previous response
      - name: sort
        in: query
        required: false
        schema:
          type: string
          default: id
        description: 'Field to sort results by. One of: `id`, `member_count`,

          a lead-score ID (format `ls_<number>`), or a custom-field ID (format `cf_<number>`).

          '
      - name: direction
        in: query
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
          default: asc
        description: Sort direction
      - name: cols
        in: query
        required: false
        schema:
          type: string
        description: 'Comma-separated list of additional columns to include in the
          response.

          Valid column values: `about`, `contactsCount`, `employees`, `linkedInUrl`,
          `profiles`,

          `revenueRangeMax`, `revenueRangeMin`, `subIndustry`, `location`, `leadScores`,

          `recentJobOpenings`, `recentNews`, `researchResults`, `surgingTopics`, `tags`,
          `topContacts`, `url`.

          Use `cf_*` to include all custom fields, or `cf_<id>` for a specific one.
          The meta

          column `recordCount` can be requested to return the total number of matching

          organizations in `meta.recordCount`.

          '
      - name: name
        in: query
        required: false
        schema:
          type: string
        description: Filter organizations by exact name match
      - name: primaryDomain
        in: query
        required: false
        schema:
          type: string
        description: Filter organizations by primary domain (exact match)
      responses:
        '200':
          description: OK
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationList'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiV2ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '429':
          $ref: '#/components/responses/RateLimited'
  /activities/{id}:
    get:
      summary: Get an activity by ID
      description: Retrieve a specific activity by its unique identifier.
      tags:
      - Activities
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: The prefixed activity ID (format `a_<number>`)
      - name: cols
        in: query
        required: false
        schema:
          type: string
