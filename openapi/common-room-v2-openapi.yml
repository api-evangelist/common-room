openapi: 3.0.0
info:
  title: Common Room API (v2)
  version: 2.0.0
  description: "Common Room API v2 for accessing contact and organization data.\n\
    <br/><br/>\nFor v1 and RTBF APIs <a href=\"./community.html\">see the V1 API documentation</a>.\n\
    <br/><br/>\nTo use the Common Room API, you will need to create an API token.\n\
    To create an API token:\n<ol>\n  <li>Navigate to Setting | API tokens\n  <li>Create\
    \ a \"New Token\"\n</ol>\n\n# Authentication\n\n<!-- ReDoc-Inject: <security-definitions>\
    \ -->"
  x-logo:
    url: /common-room-api-logo.svg
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Use a Core API JWT as a Bearer token in the Authentication header.\n\
        \nTokens can be created by room Admins through https://app.commonroom.io/\n\
        \nExample:\n\n```\ncurl -H \"Authorization: Bearer abcd123.xzy\" \\\n  https://api.commonroom.io/community/v1/api-token-status\n\
        ````\n"
  headers:
    X-RateLimit-Limit:
      description: The total amount of requests permitted within the interval
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: The total amount of requests remaining within the interval
      schema:
        type: integer
  responses:
    RateLimited:
      description: Rate Limited
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          description: The datetime in epoch seconds when the interval resets
          schema:
            type: integer
        Retry-After:
          description: The UTC datetime when the interval resets
          schema:
            type: string
            format: date-time
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
              rateLimit:
                type: object
                description: A summary of the rate limit encountered, additional information
                  is available in the headers.
                properties:
                  intervalLimit:
                    type: number
                    description: The total amount of requests permitted within the
                      interval
                  intervalRemaining:
                    type: number
                    description: The amount of requests remaining within the interval
                  intervalResetSeconds:
                    type: number
                    description: The amount of time in seconds representing a single
                      interval
                  waitMs:
                    type: number
                    description: The amount of time to wait until the next interval
    InvalidRequest:
      description: Invalid Request
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: failure
              reason:
                type: string
                description: Reason for the request failure
  schemas:
    ApiV2Error:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: A machine-readable error code identifying the failure.
          enum:
          - invalid_parameters
          - invalid_organization_id
          - org_not_found
          - invalid_contact_id
          - contact_not_found
          - invalid_object_id
          - object_not_found
          - invalid_object_type_id
          - object_type_not_found
          - invalid_segment_id
          - segment_not_found
          - invalid_activity_id
          - activity_not_found
          - conflict
          - internal_server_error
          - invalid_custom_field_id
          - custom_field_not_found
          - invalid_prospector_contact_id
          - prospector_contact_not_found
          - invalid_prospector_company_id
          - prospector_company_not_found
        message:
          type: string
          description: A human-readable description of the error.
    ApiV2ErrorResponse:
      type: object
      required:
      - success
      - error
      properties:
        success:
          type: boolean
          enum:
          - false
        error:
          $ref: '#/components/schemas/ApiV2Error'
    ApiLocation:
      type: object
      description: A best-effort location, with each component populated when known.
      properties:
        city:
          type: string
          description: City name
        region:
          type: string
          description: State, province, or region name
        country:
          type: string
          description: Country name
    ApiFieldValue:
      description: A typed custom-field value. The `type` discriminator indicates
        the value's runtime type.
      oneOf:
      - type: object
        required:
        - type
        - value
        properties:
          type:
            type: string
            enum:
            - string
          value:
            type: string
      - type: object
        required:
        - type
        - value
        properties:
          type:
            type: string
            enum:
            - url
          value:
            type: string
            format: uri
      - type: object
        required:
        - type
        - value
        properties:
          type:
            type: string
            enum:
            - int
          value:
            type: integer
      - type: object
        required:
        - type
        - value
        properties:
          type:
            type: string
            enum:
            - number
          value:
            type: number
      - type: object
        required:
        - type
        - value
        properties:
          type:
            type: string
            enum:
            - date
          value:
            type: string
            format: date-time
      - type: object
        required:
        - type
        - value
        properties:
          type:
            type: string
            enum:
            - boolean
          value:
            type: boolean
    ApiLeadScore:
      type: object
      required:
      - scoreId
      - score
      - percentile
      properties:
        scoreId:
          type: integer
          description: The numeric ID of the lead-score definition
        score:
          type: number
          description: The raw score for this contact or organization
        percentile:
          type: number
          description: The percentile rank of the score within the community
    ApiActivity:
      type: object
      required:
      - id
      - type
      - activityTime
      properties:
        id:
          type: string
          description: Prefixed activity ID (format `a_<number>`)
        type:
          type: string
          description: Activity type identifier (e.g. `tweet`, `pr_comment`)
        activityTime:
          type: string
          format: date-time
          description: When the activity occurred
        contactId:
          type: string
          description: Prefixed contact ID (format `c_<number>`)
        content:
          type: string
          nullable: true
        isUserInitiated:
          type: boolean
        participantCount:
          type: integer
        providerId:
          type: string
          description: Prefixed signal source ID (format `sig_<number>`)
        providerName:
          type: string
          nullable: true
        replyCount:
          type: integer
        sentiment:
          type: string
          nullable: true
        subSourceNames:
          type: array
          items:
            type: string
        url:
          type: string
          format: uri
    ApiActivityType:
      type: object
      required:
      - id
      - displayName
      properties:
        id:
          type: string
          description: Activity type identifier (e.g. `tweet`, `pr_comment`)
        displayName:
          type: string
          description: Human-readable display name for the activity type
    ActivityTypeList:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiActivityType'
    ActivityResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          $ref: '#/components/schemas/ApiActivity'
    ActivityList:
      type: object
      required:
      - success
      - data
      - meta
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiActivity'
        meta:
          type: object
          required:
          - nextCursor
          properties:
            nextCursor:
              type: string
              nullable: true
              description: Cursor for pagination; pass as the `cursor` query parameter
                to fetch the next page.
            recordCount:
              type: integer
              description: Total number of records matching the query. Only returned
                when `cols=recordCount` is requested.
    Contact:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          description: Prefixed contact ID (format `c_<number>`)
        name:
          type: string
          description: The contact's display name
        avatarUrl:
          type: string
          format: uri
          nullable: true
        fullName:
          type: string
          nullable: true
        location:
          allOf:
          - $ref: '#/components/schemas/ApiLocation'
          nullable: true
        primaryEmail:
          type: string
          nullable: true
        phoneNumbers:
          type: array
          items:
            type: object
            required:
            - type
            - value
            properties:
              type:
                type: string
              value:
                type: string
        title:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        companyWebsite:
          type: string
          nullable: true
        connectedCustomObjects:
          type: array
          items:
            type: object
            required:
            - id
            - name
            - objectType
            properties:
              id:
                type: string
                description: Prefixed custom object ID (format `co_<number>`)
              name:
                type: string
              objectType:
                type: string
        customFields:
          type: object
          description: Map of custom-field ID (format `cf_<number>`) to its typed
            value.
          additionalProperties:
            $ref: '#/components/schemas/ApiFieldValue'
        profiles:
          type: array
          items:
            type: object
            required:
            - type
            - value
            properties:
              type:
                type: string
              value:
                type: string
        jobHistory:
          type: array
          items:
            type: object
            required:
            - company
            - title
            - startDate
            - endDate
            properties:
              company:
                type: string
              title:
                type: string
                nullable: true
              startDate:
                type: string
              endDate:
                type: string
                nullable: true
        leadScores:
          type: array
          items:
            $ref: '#/components/schemas/ApiLeadScore'
        segments:
          type: array
          items:
            type: object
            required:
            - id
            - name
            properties:
              id:
                type: string
                description: Prefixed segment ID (format `s_<number>`)
              name:
                type: string
        recentWebPages:
          type: array
          items:
            type: object
            required:
            - url
            - numVisits
            properties:
              url:
                type: string
              numVisits:
                type: integer
        recentWebVisitsNumber:
          type: integer
        recentActivities:
          type: array
          items:
            $ref: '#/components/schemas/ApiActivity'
        activateMessage:
          type: object
          nullable: true
          required:
          - title
          - message
          properties:
            title:
              type: string
            message:
              type: string
              nullable: true
        sparkSummary:
          type: string
          nullable: true
        recentSparkSummaries:
          type: array
          items:
            type: string
        tags:
          type: array
          description: Prefixed label IDs (format `l_<number>`)
          items:
            type: string
        url:
          type: string
          format: uri
          description: Common Room URL for this contact
    ContactResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          $ref: '#/components/schemas/Contact'
    ContactList:
      type: object
      required:
      - success
      - data
      - meta
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        meta:
          type: object
          required:
          - nextCursor
          properties:
            nextCursor:
              type: string
              nullable: true
              description: Cursor for pagination; pass as the `cursor` query parameter
                to fetch the next page.
            recordCount:
              type: integer
              description: Total number of records matching the query. Only returned
                when `cols=recordCount` is requested.
    Organization:
      type: object
      required:
      - id
      - name
      - primaryDomain
      properties:
        id:
          type: string
          description: Prefixed organization ID (format `o_<number>`)
        name:
          type: string
          description: The organization's name
        primaryDomain:
          type: string
          description: The organization's primary domain name
        about:
          type: string
          nullable: true
        contactsCount:
          type: integer
          nullable: true
        employees:
          type: integer
          nullable: true
        linkedInUrl:
          type: string
          nullable: true
        profiles:
          type: array
          items:
            type: object
            required:
            - name
            - type
            - url
            properties:
              name:
                type: string
              type:
                type: string
              url:
                type: string
                format: uri
                nullable: true
        revenueRangeMax:
          type: integer
          nullable: true
        revenueRangeMin:
          type: integer
          nullable: true
        subIndustry:
          type: string
          nullable: true
        location:
          allOf:
          - $ref: '#/components/schemas/ApiLocation'
          nullable: true
        customFields:
          type: object
          description: Map of custom-field ID (format `cf_<number>`) to its typed
            value.
          additionalProperties:
            $ref: '#/components/schemas/ApiFieldValue'
        leadScores:
          type: array
          items:
            $ref: '#/components/schemas/ApiLeadScore'
        researchResults:
          type: array
          items:
            type: object
            required:
            - promptId
            - answer
            - isPrimaryPrompt
            properties:
              promptId:
                type: string
              answer:
                type: string
              isPrimaryPrompt:
                type: boolean
        recentJobOpenings:
          type: array
          items:
            type: object
            required:
            - jobTitle
            - url
            - firstSeenAt
            - isClosed
            - location
            properties:
              jobTitle:
                type: string
              jobDescription:
                type: string
                nullable: true
              url:
                type: string
                format: uri
              firstSeenAt:
                type: string
              isClosed:
                type: boolean
              location:
                type: string
                nullable: true
        recentNews:
          type: array
          items:
            type: object
            required:
            - title
            - url
            - publishedAt
            - category
            - articleSentence
            properties:
              title:
                type: string
              url:
                type: string
                format: uri
              publishedAt:
                type: string
              category:
                type: string
              articleSentence:
                type: string
                nullable: true
        surgingTopics:
          type: array
          description: Bombora surging topic names this organization is showing buyer
            intent for. Empty unless the Bombora integration is enabled.
          items:
            type: string
        tags:
          type: array
          description: Prefixed label IDs (format `l_<number>`)
          items:
            type: string
        topContacts:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        url:
          type: string
          format: uri
          description: Common Room URL for this organization
    OrganizationResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          $ref: '#/components/schemas/Organization'
    OrganizationList:
      type: object
      required:
      - success
      - data
      - meta
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
        meta:
          type: object
          required:
          - nextCursor
          properties:
            nextCursor:
              type: string
              nullable: true
              description: Cursor for pagination; pass as the `cursor` query parameter
                to fetch the next page.
            recordCount:
              type: integer
              description: Total number of records matching the query. Only returned
                when `cols=recordCount` is requested.
    ApiSegment:
      type: object
      required:
      - id
      - name
      - entityType
      properties:
        id:
          type: string
          description: Prefixed segment ID (format `s_<number>`)
        name:
          type: string
          description: The segment's display name
        entityType:
          type: string
          enum:
          - contact
          - object
          - organization
          description: The type of entity this segment contains
        entityCount:
          type: integer
          description: Number of entities in this segment
        url:
          type: string
          format: uri
          description: Common Room URL for this segment
    SegmentResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          $ref: '#/components/schemas/ApiSegment'
    SegmentList:
      type: object
      required:
      - success
      - data
      - meta
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiSegment'
        meta:
          type: object
          properties:
            nextCursor:
              type: string
              nullable: true
              description: Cursor for pagination; pass as the `cursor` query parameter
                to fetch the next page.
            recordCount:
              type: integer
              description: Total number of records matching the query. Only returned
                when `cols=recordCount` is requested.
    CreateSegmentRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: The name for the new segment (max 500 characters)
        description:
          type: string
          description: Optional description for the segment (markdown supported)
        entityType:
          type: string
          enum:
          - contact
          - object
          - organization
          default: contact
          description: The type of entity this segment will contain
        objectTypeId:
          type: string
          description: Required when entityType is `object`. Prefixed object type
            ID (format `cot_<number>`)
    CreateSegmentResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: object
          required:
          - id
          - name
          properties:
            id:
              type: string
              description: Prefixed segment ID (format `s_<number>`)
            name:
              type: string
    ApiCustomField:
      type: object
      required:
      - id
      - name
      - entityTypes
      - keyField
      - valueType
      properties:
        id:
          type: string
          description: Prefixed custom field ID (format `cf_<number>`)
        name:
          type: string
          description: The custom field's display name
        entityTypes:
          type: array
          items:
            type: string
            enum:
            - contact
            - object
            - organization
          description: Entity types this field applies to
        keyField:
          type: boolean
          description: Whether this is a key field used for deduplication
        valueType:
          type: string
          enum:
          - string
          - url
          - int
          - number
          - date
          - boolean
          description: The data type of field values
        sampleValues:
          type: array
          items:
            $ref: '#/components/schemas/ApiFieldValue'
          description: Example values for this field
        description:
          type: string
          nullable: true
          description: Human-readable description of the field
        targetSubTypes:
          type: array
          items:
            type: string
          description: Sub-types this field targets
        providedBy:
          type: string
          nullable: true
          description: Name of the provider that owns this field, if any
        objectTypeId:
          type: string
          description: Prefixed object type ID (format `cot_<number>`), if this field
            belongs to a specific object type
    CustomFieldResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          $ref: '#/components/schemas/ApiCustomField'
    CustomFieldList:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiCustomField'
    ApiLeadScoreDefinition:
      type: object
      required:
      - id
      - name
      - enabled
      - entityType
      - isPrimaryScore
      properties:
        id:
          type: string
          description: Prefixed lead score ID (format `ls_<number>`)
        name:
          type: string
          description: The lead score's display name
        enabled:
          type: boolean
          description: Whether this lead score is currently enabled
        entityType:
          type: string
          enum:
          - contact
          - organization
          - object
          description: The type of entity this lead score applies to
        isPrimaryScore:
          type: boolean
          description: Whether this is the primary score for its entity type
    LeadScoreDefinitionResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          $ref: '#/components/schemas/ApiLeadScoreDefinition'
    LeadScoreDefinitionList:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiLeadScoreDefinition'
    ApiTag:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          description: Prefixed tag ID (format `l_<number>`)
        name:
          type: string
          description: The tag's display name
        description:
          type: string
          nullable: true
          description: Human-readable description of the tag
        entityTypes:
          type: array
          items:
            type: string
            enum:
            - contact
            - organization
            - activity
          description: Entity types this tag can be applied to
    TagResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          $ref: '#/components/schemas/ApiTag'
    TagList:
      type: object
      required:
      - success
      - data
      - meta
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiTag'
        meta:
          type: object
          required:
          - nextCursor
          properties:
            nextCursor:
              type: string
              nullable: true
              description: Cursor for pagination; pass as the `cursor` query parameter
                to fetch the next page.
    MeResponse:
      type: object
      required:
      - success
      - data
      properties:
        success:
          type: boolean
          enum:
          - true
        data:
          type: object
          required:
          - id
          - communityId
          - name
          - role
          properties:
            id:
              type: string
              description: Prefixed contact ID (format `c_<number>`)
            communityId:
              type: string
              description: Prefixed community ID (format `com_<number>`)
            name:
              type: string
              description: The authenticated user's display name
            title:
              type: string
              nullable: true
              description: The user's job title
            role:
              type: string
              description: The user's role in the community
            loginEmail:
              type: string
              nullable: true
              description: The user's login email address
            profiles:
              type: array
              items:
                type: object
                required:
                - type
                - handle
                properties:
                  type:
                    type: string
                  handle:
                    type: string
            segments:
              type: array
              description: Segments bookmarked by this user
              items:
                type: object
                required:
                - id
                - name
                properties:
                  id:
                    type: string
                  name:
                    type: string
            personas:
              type: array
              items:
                type: object
                required:
                - id
                - name
                properties:
                  id:
                    type: string
                  name:
                    type: string
            company:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                domains:
                  type: array
                  items:
                    type: string
                summary:
                  type: string
                  nullable: true
    ApiLocationItem:
      type: object
      required:
      - id
      - name
      - type
      properties:
        id:
          type: string
          description: Prefixed location ID
        name:
          type: string
          description: Display name for the location
        type:
          type: string
          enum:
          - city
          - country
          - country_region
          - world_region
          description: The granularity of this location
        city:
          type: string
        region:
          type: string
        country:
          type: string
    LocationItemResponse:
      type: object
      required:
      - success
      - data
